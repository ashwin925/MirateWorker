{% extends "base.html" %}

{% block content %}
<div style="max-width: 900px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i class="bi bi-plus-circle"></i> Create New Job Opening</h3>
        </div>
        
        <form method="POST">
            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-briefcase"></i> Job Title *</label>
                    <input type="text" class="form-control" name="title" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-building"></i> Company Name *</label>
                    <input type="text" class="form-control" name="company_name" required>
                </div>
            </div>

            <div class="grid grid-3">
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-geo-alt"></i> Location *</label>
                    <input type="text" class="form-control" name="location" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-tag"></i> Job Type *</label>
                    <select class="form-control" name="job_type" required>
                        <option value="">Select Type</option>
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Contract">Contract</option>
                        <option value="Temporary">Temporary</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-cash"></i> Salary Range *</label>
                    <input type="text" class="form-control" name="salary_range" placeholder="e.g., ₹15,000 - ₹20,000" required>
                </div>
            </div>

            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-people"></i> Number of Vacancies *</label>
                    <input type="number" class="form-control" name="vacancies" min="1" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-calendar"></i> Application Deadline *</label>
                    <input type="date" class="form-control" name="deadline" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="bi bi-file-text"></i> Job Description *</label>
                <textarea class="form-control" name="description" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="bi bi-list-check"></i> Requirements *</label>
                <textarea class="form-control" name="requirements" rows="4" required></textarea>
            </div>

            <div class="flex gap-8">
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="bi bi-check-circle"></i> Create Job Opening
                </button>
            </div>
            
            <div class="text-center mt-16">
                <a href="{{ url_for('admin_jobs') }}" class="text-primary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
