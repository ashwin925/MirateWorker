{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title text-center"><i class="bi bi-person-check-fill"></i> Worker Login</h3>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label"><i class="bi bi-phone"></i> Mobile Number</label>
                <input type="tel" class="form-control" name="mobile" pattern="[0-9]{10}" autocomplete="username" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="bi bi-key"></i> Password</label>
                <input type="password" class="form-control" name="password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
            
            <div class="text-center mt-16">
                <a href="{{ url_for('index') }}" class="text-primary">New Registration</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
