{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i class="bi bi-person-plus"></i> Add New User</h3>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label class="form-label"><i class="bi bi-person"></i> Username *</label>
                <input type="text" class="form-control" name="username" required>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="bi bi-key"></i> Password *</label>
                <input type="password" class="form-control" name="password" required>
            </div>

            <div class="form-group">
                <label class="form-label"><i class="bi bi-shield"></i> Role *</label>
                <select class="form-control" name="role" required>
                    <option value="staff">Staff</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
                <i class="bi bi-check-circle"></i> Add User
            </button>
            
            <div class="text-center mt-16">
                <a href="{{ url_for('admin_dashboard') }}" class="text-primary">Back to Dashboard</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
